services:
  app:
    build: .
    container_name: sispmpi_app
    ports:
      - "3004:80"
    volumes:
      - .:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
  sispmpi_queue:
    build: .
    container_name: sispmpi_queue
    restart: always
    command: php yii queue/listen --verbose=0
    env_file: .env
    extra_hosts:
      - "host.docker.internal:172.23.0.1" # Mesma rede do host
