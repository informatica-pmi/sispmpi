version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80" # Você acessará o sistema no navegador por http://localhost:8000
    volumes:
      # Espelha a pasta atual do WSL para dentro do container
      # Isso permite que você edite o código e veja a mudança na hora
      - ./:/var/www/html
    environment:
      # Variáveis de ambiente injetadas no PHP (para o WSL)
      - DB_HOST=db
      - DB_NAME=sispmpi
      - DB_USER=usuariolocal
      - DB_PASSWORD=senhalocal
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=sispmpi
      - MYSQL_USER=usuariolocal
      - MYSQL_PASSWORD=senhalocal
    ports:
      - "3306:3306" # Permite que você conecte um DBeaver/DataGrip se quiser inspecionar o banco
    volumes:
      # Volume nomeado para persistir os dados do banco no seu WSL
      - db_data:/var/lib/mysql

volumes:
  db_data: